linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gocritic
    - gofmt
    - goimports
    - misspell
    - prealloc
    - revive

issues:
  exclude-rules:
    # Upstream ported code — preserve as-is for fidelity
    - path: internal/
      linters: [gocritic, revive]

linters-settings:
  goimports:
    local-prefixes: github.com/perdasilva/rv1
  revive:
    rules:
      - name: blank-imports
      - name: exported
      - name: error-return
      - name: increment-decrement
      - name: range
      - name: receiver-naming
      - name: var-naming
